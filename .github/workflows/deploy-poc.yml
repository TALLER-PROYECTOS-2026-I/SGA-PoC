name: Deploy SGA PoC (Front & Back)

on:
  push:
    branches:
      - main
      - master

env:
  NODE_VERSION: '22.x' # La versión que instalamos juntos

jobs:
  # --- TRABAJO 1: DESPLIEGUE DEL FRONTEND ---
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Desplegar a Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/frontend"   
          api_location: ""            
          output_location: "dist"     

  # --- TRABAJO 2: DESPLIEGUE DEL BACKEND ---
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js v22
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Instalar y Compilar Backend
        run: |
          cd backend
          npm install
          npm run build --if-present

      - name: Desplegar a Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: 'func-poc-linux-lvvcbfse5nadi' 
          package: './backend'
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
